name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - id: install
        continue-on-error: true
        run: npm install --no-audit --no-fund --legacy-peer-deps 2>&1 | tee install.log

      - id: lint
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run lint 2>&1 | tee lint.log

      - id: test
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm test 2>&1 | tee test.log

      - id: build
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run build 2>&1 | tee build.log

      - name: Post failure log to PR
        if: github.event_name == 'pull_request' && (steps.install.outcome == 'failure' || steps.lint.outcome == 'failure' || steps.test.outcome == 'failure' || steps.build.outcome == 'failure')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          INSTALL: ${{ steps.install.outcome }}
          LINT: ${{ steps.lint.outcome }}
          TEST: ${{ steps.test.outcome }}
          BUILD: ${{ steps.build.outcome }}
        run: |
          {
            echo "### CI failure log (auto-posted)"
            echo
            for s in install lint test build; do
              case "$s" in
                install) o="$INSTALL"; cmd="npm install" ;;
                lint)    o="$LINT";    cmd="npm run lint" ;;
                test)    o="$TEST";    cmd="npm test" ;;
                build)   o="$BUILD";   cmd="npm run build" ;;
              esac
              if [ "$o" = "failure" ]; then
                echo "**Step:** \`$cmd\`"
                echo
                echo '```'
                tail -n 100 "$s.log" 2>/dev/null || echo "(log unavailable)"
                echo '```'
                echo
              fi
            done
          } > comment.md
          gh pr comment "$PR" --body-file comment.md --repo "$GITHUB_REPOSITORY"

      - name: Fail job if any prior step failed
        if: steps.install.outcome == 'failure' || steps.lint.outcome == 'failure' || steps.test.outcome == 'failure' || steps.build.outcome == 'failure'
        run: exit 1

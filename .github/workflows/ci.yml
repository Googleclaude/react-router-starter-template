name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - id: install
        continue-on-error: true
        run: npm install --no-audit --no-fund --legacy-peer-deps 2>&1 | tee install.log

      - id: build
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run build 2>&1 | tee build.log

      - name: Post failure log to PR
        if: github.event_name == 'pull_request' && (steps.install.outcome == 'failure' || steps.build.outcome == 'failure')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          {
            echo "### CI failure log (auto-posted)"
            echo
            if [ "${{ steps.install.outcome }}" = "failure" ]; then
              echo "**Step:** \`npm install\`"
              echo
              echo '```'
              tail -n 100 install.log
              echo '```'
            else
              echo "**Step:** \`npm run build\`"
              echo
              echo '```'
              tail -n 100 build.log
              echo '```'
            fi
          } > comment.md
          gh pr comment "$PR" --body-file comment.md --repo "$GITHUB_REPOSITORY"

      - name: Fail job if any prior step failed
        if: steps.install.outcome == 'failure' || steps.build.outcome == 'failure'
        run: exit 1
